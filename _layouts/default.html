<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>

<body>
    <header class="navbar">
        <div class="logo-container">
            <!-- User logo will go here. Fallback to text if missing. -->
            <img src="{{ '/assets/logo.png' | relative_url }}" alt="Culebra Creek Customs Logo" class="logo-img"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span class="logo-text" style="display:none;">Culebra Creek</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="{{ '/' | relative_url }}#home">Home</a></li>
                <li><a href="{{ '/' | relative_url }}#customers">Who We Serve</a></li>
                <li><a href="{{ '/' | relative_url }}#projects">Projects</a></li>
                <li><a href="{{ '/' | relative_url }}#store" class="btn-primary">Store (Coming Soon)</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-brand">
                <h3>Culebra Creek Customs</h3>
                <p>Built with precision & pride.</p>
            </div>
            <div class="footer-links">
                <a href="{{ '/' | relative_url }}#home">Home</a>
                <a href="{{ '/' | relative_url }}#customers">Customers</a>
                <a href="{{ '/' | relative_url }}#projects">Projects</a>
            </div>
        </div>
        <p class="copyright">&copy; {{ 'now' | date: '%Y' }} Culebra Creek Customs. All rights reserved.</p>
    </footer>
</body>

</html>
